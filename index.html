<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCT College Indoor Map Directory</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
        }

        :root {
            --primary-color: #1e40af;
            --secondary-color: #3b82f6;
            --accent-color: #60a5fa;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --text-secondary: #94a3b8;
            
        }

        body {
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-color);
            min-height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            cursor: pointer;
        }

        /* Page Container */
        .page {
            display: none;
            width: 100vw;
            height: 100vh;
            padding: 1rem;
            animation: fadeIn 0.4s ease-out;
            
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Welcome Page */
        #welcomePage {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
            position: relative;
            overflow: hidden;
        }

        /* Background image layer */
    #welcomePage::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('background.jpg');
        background-size: cover;
        background-position: bottom center;
        background-repeat: no-repeat;
        opacity: 0.3;
        z-index: 0;
    }

        @keyframes slidePattern {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        .welcome-logo {
            width: 40vmin;
            height: 40vmin;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3rem;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            padding: 1.5vmin;
        }

        .welcome-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        @keyframes zoom {
    0%   { transform: scale(1.5); }
    50%  { transform: scale(2.8); }
    100% { transform: scale(1.5); }
}

        .welcome-text {
            font-size: 2.5rem;
            font-weight: 300;
            text-align: center;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Main Page */
       #mainPage {
        flex-direction: column;
        position: relative;
        overflow: hidden;
    }

    /* Background image layer for main page */
    #mainPage::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('background.jpg');
        background-size: cover;
        background-position: bottom center;
        background-repeat: no-repeat;
        opacity: 0.5;
        z-index: 0;
    }

    /* Keep content above background */
    #mainPage > * {
        position: relative;
        z-index: 1;
    }

        .header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 0.5rem;
        }

        .logo-small {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-small img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 3rem;
        }

        .main-buttons {
            display: flex;
            gap: 3rem;
        }

        .main-btn {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 24px;
            font-size: 2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        .main-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .main-btn:hover::before {
            left: 100%;
        }

        .main-btn:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.5);
        }

        .main-btn:active {
            transform: translateY(-5px) scale(1.02);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .back-btn, .home-btn {
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        /* Search Page */
        #searchPage {
            flex-direction: column;
        }

        .search-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            /* Add bottom padding equal to keyboard height so content isn't hidden behind it */
            padding-bottom: 280px;
            overflow: hidden;

}

        .search-input-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1.5rem 2rem;
            font-size: 1.5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            backdrop-filter: blur(10px);
            font-family: 'Lexend', sans-serif;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
        }

        .results-container {
            flex: 0 1 auto;
            max-height: 35vh;
            overflow-y: auto;
            padding: 1rem;
            margin-bottom: 0.5rem;
        }

        .result-item {
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            transform: translateX(10px);
        }

        .result-info h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .result-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .category-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

.keyboard {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    display: none;          /* hidden by default */
    flex-direction: column;
    gap: 0.4rem;
    padding: 0.8rem 1rem;
    background: rgba(15, 23, 42, 0.97);
    border-top: 2px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    z-index: 999;
}
.keyboard.visible {
    display: flex;
}
        .keyboard-row {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .key {
            padding: 1rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            min-width: 50px;
        }

        .key:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .key:active {
            transform: translateY(0);
            background: var(--accent-color);
        }

        .key.space {
            flex: 1;
            min-width: 200px;
        }

        .key.backspace, .key.clear {
            min-width: 100px;
        }

        .not-found {
            text-align: center;
            font-size: 1.5rem;
            color: var(--text-secondary);
            padding: 3rem;
        }

        /* Floor Selection Page */
        #floorPage {
            flex-direction: column;
        }

        .floor-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            padding: 2rem 0;
        }

        .floor-btn {
            background: linear-gradient(135deg, var(--card-bg), var(--primary-color));
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .floor-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.4);
        }

        .floor-label {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        /* Map Page */
        #mapPage {
            flex-direction: column;
        }

        .map-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .floor-tabs {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            justify-content: center;
            flex-wrap: wrap;
        }

        .floor-tab {
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 80px;
            text-align: center;
        }

        .floor-tab:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        .floor-tab.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: var(--accent-color);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .floor-title {
            font-size: 2rem;
            font-weight: 600;
        }

        #map {
            flex: 1;
            min-height: 0;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* Map Legend */
        .map-legend {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid white;
        }

        /* Room Detail Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 3rem;
            max-width: 600px;
            width: 90%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .room-image {
            width: 100%;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .room-name {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .room-details {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .room-detail {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.2rem;
        }

        .detail-label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .close-modal {
            width: 100%;
            padding: 1rem;
            background: var(--primary-color);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        /* Leaflet Custom Styles */
        .leaflet-container {
            background: #1e293b;
        }

        .room-marker {
            transition: all 0.3s ease;
        }

        .room-marker:hover {
            transform: scale(1.1);
        }

        .room-popup {
            font-family: 'Lexend', sans-serif;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

        // Setup event listeners

        // Show page
        function showPage(pageName) {
            Object.values(pages).forEach(page => page.classList.remove('active'));
            pages[pageName].classList.add('active');
            currentPage = pageName;

            // Reset search when leaving search page
            const keyboard = document.getElementById('keyboard');
            if (pageName === 'search') {
                keyboard.classList.add('visible');
            } else {
                keyboard.classList.remove('visible');
            }

            if (pageName !== 'search') {
                document.getElementById('searchInput').value = '';
                searchResults = [];
                updateSearchResults();
            }
        }

        // Create keyboard
        function createKeyboard() {
            const keyboard = document.getElementById('keyboard');
            
            const keyboardLayout = [
                ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
                ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
                ['Z', 'X', 'C', 'V', 'B', 'N', 'M'],
                ['1', '2', '3', '4', '5', '6', '7', '8', '9', '0', '.'],
                ['SPACE', '←', 'CLEAR']
            ];

            keyboardLayout.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard-row';
                
                row.forEach(key => {
                    const keyBtn = document.createElement('button');
                    keyBtn.className = 'key';
                    keyBtn.textContent = key === 'SPACE' ? '␣' : key === '←' ? '⌫' : key;
                    
                    if (key === 'SPACE') {
                        keyBtn.classList.add('space');
                    } else if (key === '←') {
                        keyBtn.classList.add('backspace');
                    } else if (key === 'CLEAR') {
                        keyBtn.classList.add('clear');
                    }

                    keyBtn.addEventListener('click', () => handleKeyPress(key));
                    rowDiv.appendChild(keyBtn);
                });
                
                keyboard.appendChild(rowDiv);
            });
        }

        // Handle key press
        function handleKeyPress(key) {
            const input = document.getElementById('searchInput');
            let value = input.value;

            if (key === '←') {
                value = value.slice(0, -1);
            } else if (key === 'SPACE') {
                value += ' ';
            } else if (key === 'CLEAR') {
                value = '';
            } else {
                value += key;
            }

            input.value = value;
            performSearch(value);
        }

        // Perform search
        function performSearch(query) {
            if (query.trim() === '') {
                searchResults = [];
                updateSearchResults();
                return;
            }

            searchResults = roomsData.filter(room => 
                room.name.toLowerCase().includes(query.toLowerCase()) ||
                room.category.toLowerCase().includes(query.toLowerCase())
            );

            updateSearchResults();
        }

        // Update search results
        function updateSearchResults() {
            const container = document.getElementById('resultsContainer');
            
            if (searchResults.length === 0 && document.getElementById('searchInput').value.trim() !== '') {
                container.innerHTML = '<div class="not-found">❌ Not Found</div>';
                return;
            }

            if (searchResults.length === 0) {
                container.innerHTML = '<div class="not-found">Start typing to search...</div>';
                return;
            }

            container.innerHTML = searchResults.map(room => `
                <div class="result-item" onclick="showRoomOnMap(${room.id})">
                    <div class="result-info">
                        <h3>${room.name}</h3>
                        <div class="result-meta">
                            <span>📍 Floor ${room.floor}</span>
                            <span class="category-badge" style="background: ${categoryColors[room.category]};">
                                ${room.category}
                            </span>
                        </div>
                    </div>
                    <div style="font-size: 2rem;">${room.image}</div>
                </div>
            `).join('');
        }

        // Show room on map
        function showRoomOnMap(roomId) {
            const room = roomsData.find(r => r.id === roomId);
            if (!room) return;

            currentFloor = room.floor;
            showFloorMap(room.floor, roomId);
        }

        // Show floor map
        function showFloorMap(floor, highlightRoomId = null) {
            currentFloor = floor;
            showPage('map');

            // Update active tab
            document.querySelectorAll('.floor-tab').forEach(tab => {
                if (parseInt(tab.dataset.floor) === floor) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            // Initialize map if not already done
           // Always destroy and recreate the map on floor switch
if (map) {
    map.remove();   // fully destroys the Leaflet instance
    map = null;
    markers = [];
    currentImageOverlay = null;
}

map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 3,
    zoomControl: false,
    zoomSnap: 0.25,
    zoomDelta: 0.5,
    wheelPxPerZoomLevel: 120,
    inertia: true,
    animate: true
}); 

            // Get floor plan configuration
            const floorConfig = floorPlanConfig[floor];
            const bounds = floorConfig.bounds;
            
            // Set map bounds
            map.fitBounds(bounds);

            // Add floor plan image as overlay
            currentImageOverlay = L.imageOverlay(floorConfig.image, bounds, {
                opacity: 0.8,
                interactive: false
            }).addTo(map);

            // Get rooms for this floor
            const floorRooms = roomsData.filter(r => r.floor === floor);

            // Add room markers - NO BOXES, JUST EMOJIS
            floorRooms.forEach(room => {
                const icon = L.divIcon({
                    className: 'room-marker',
                    html: `
                        <div style="
                            text-align: center;
                            font-size: 2.5rem;
                            cursor: pointer;
                            ${room.id === highlightRoomId ? 'animation: zoom 0.8s ease-in-out infinite; transform-origin: center center;' : ''}
                        ">
                            ${room.image}
                        </div>
                    `,
                    iconSize: [40, 40],
                    iconAnchor: [20, 20]
                });

                const marker = L.marker(room.coordinates, { icon: icon })
                    .addTo(map)
                    .bindPopup(`
                        <div class="room-popup" style="font-family: Lexend, sans-serif; text-align: center;">
                            <h3 style="margin-bottom: 8px;">${room.name}</h3>
                            <p style="margin-bottom: 4px;">Floor: ${room.floor}F</p>
                            <p style="color: ${categoryColors[room.category]}; font-weight: 600;">${room.category}</p>
                        </div>
                    `);

                marker.on('click', () => showRoomDetails(room.id));
                markers.push(marker);
            });

            // If highlighting a specific room, zoom to it
            if (highlightRoomId) {
                const room = floorRooms.find(r => r.id === highlightRoomId);
                if (room) {
                    map.setView(room.coordinates, 0);
                    setTimeout(() => showRoomDetails(highlightRoomId), 500);
                }
            }
        }

        // Show room details
        function showRoomDetails(roomId) {
            const room = roomsData.find(r => r.id === roomId);
            if (!room) return;

            document.getElementById('roomImage').textContent = room.image;
            document.getElementById('roomName').textContent = room.name;
            document.getElementById('roomLocation').textContent = `${room.floor}F`;
            
            const categoryBadge = document.getElementById('roomCategory');
            categoryBadge.textContent = room.category;
            categoryBadge.style.background = categoryColors[room.category];

            document.getElementById('roomModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('roomModal').classList.remove('active');
        }

        window.addEventListener('DOMContentLoaded', init);
