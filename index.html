<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCT College Indoor Map Directory</title>

    <!-- Leaflet CSS -->
<link rel="stylesheet" href="assets/leaflet/leaflet.css" />

    <!-- Your Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Welcome Page -->
    <div id="welcomePage" class="page active">
        <div class="welcome-logo">
            <img src="logo.png" alt="ICCT College Logo" id="welcomeLogoImg">
        </div>
        <div class="welcome-text">Touch anywhere to start</div>
    </div>

    <!-- Main Page -->
    <div id="mainPage" class="page">
        <div class="header">
            <div class="logo-small">
                <img src="logo.png" alt="ICCT College Logo">
            </div>
        </div>
        <div class="main-content">
            <div class="main-buttons">
                <button class="main-btn" id="searchBtn">🔍<br>Search</button>
                <button class="main-btn" id="mapBtn">🗺️<br>Map</button>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="back-btn" id="mainBackBtn">← Back</button>
            <button class="home-btn" id="mainHomeBtn">🏠 Home</button>
        </div>
    </div>

    <!-- Search Page -->
    <div id="searchPage" class="page">
        <div class="header">
            <div class="logo-small">
                <img src="logo.png" alt="ICCT College Logo">
            </div>
        </div>
        <div class="search-container">
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Search for a room..." readonly>
            </div>
            <div class="results-container" id="resultsContainer"></div>
        </div>
    </div>

    <!-- On-Screen Keyboard -->
<div class="keyboard" id="keyboard"></div>

<!-- Search Nav Buttons (below keyboard) -->
<div id="searchNavButtons">
    <button class="back-btn" id="searchBackBtn">← Back</button>
    <button class="home-btn" id="searchHomeBtn">🏠 Home</button>
</div>

    <!-- Floor Selection Page -->
    <div id="floorPage" class="page">
        <div class="header">
            <div class="logo-small">
                <img src="logo.png" alt="ICCT College Logo">
            </div>
        </div>
        <div class="floor-grid">
            <button class="floor-btn" data-floor="1"><span class="floor-label">First Floor</span><span>1F</span></button>
            <button class="floor-btn" data-floor="2"><span class="floor-label">Second Floor</span><span>2F</span></button>
            <button class="floor-btn" data-floor="3"><span class="floor-label">Third Floor</span><span>3F</span></button>
            <button class="floor-btn" data-floor="4"><span class="floor-label">Fourth Floor</span><span>4F</span></button>
            <button class="floor-btn" data-floor="5"><span class="floor-label">Fifth Floor</span><span>5F</span></button>
            <button class="floor-btn" data-floor="6"><span class="floor-label">Sixth Floor</span><span>6F</span></button>
            <button class="floor-btn" data-floor="7"><span class="floor-label">Seventh Floor</span><span>7F</span></button>
        </div>
        <div class="nav-buttons">
            <button class="back-btn" id="floorBackBtn">← Back</button>
            <button class="home-btn" id="floorHomeBtn">🏠 Home</button>
        </div>
    </div>

    <!-- Map Page -->
    <div id="mapPage" class="page">
        <div class="map-header">
            <div class="floor-tabs">
                <button class="floor-tab" data-floor="1">1F</button>
                <button class="floor-tab" data-floor="2">2F</button>
                <button class="floor-tab" data-floor="3">3F</button>
                <button class="floor-tab" data-floor="4">4F</button>
                <button class="floor-tab" data-floor="5">5F</button>
                <button class="floor-tab" data-floor="6">6F</button>
                <button class="floor-tab" data-floor="7">7F</button>
            </div>
            <div class="logo-small">
                <img src="logo.png" alt="ICCT College Logo">
            </div>
        </div>

        <div id="map"></div>

        <!-- Zoom Controls -->
        <div style="position:absolute; right:1.5rem; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:0.5rem; z-index:500;">
            <button id="zoomInBtn"  style="width:50px;height:50px;background:rgba(30,64,175,0.9);border:2px solid rgba(255,255,255,0.3);border-radius:12px;color:white;font-size:1.8rem;cursor:pointer;">+</button>
            <button id="zoomOutBtn" style="width:50px;height:50px;background:rgba(30,64,175,0.9);border:2px solid rgba(255,255,255,0.3);border-radius:12px;color:white;font-size:1.8rem;cursor:pointer;">−</button>
        </div>

        <!-- Legend -->
        <div class="map-legend">
            <div class="legend-item"><div class="legend-color" style="background:#a0c5fd;"></div><span>Academic</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#b7e7f2;"></div><span>Laboratory</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#fff69a;"></div><span>Administration</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#d4bcfd;"></div><span>Library</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#ffb8cb;"></div><span>Hospitality</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#b5eea7;"></div><span>Health Services</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#ff3131;"></div><span>Windows</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#faada5;"></div><span>Recreational & Event Facilities</span></div>
            <div class="legend-item"><div class="legend-color" style="background:#d3c09b;"></div><span>Sanitary Facilities</span></div>
        </div>

        <div class="nav-buttons">
            <button class="back-btn" id="mapBackBtn">← Back</button>
            <button class="home-btn" id="mapHomeBtn">🏠 Home</button>
        </div>
    </div>

    <!-- Room Detail Modal -->
    <div class="modal" id="roomModal">
        <div class="modal-content">
            <div class="room-image" id="roomImage">🚪</div>
            <h2 class="room-name" id="roomName">Room Name</h2>
            <div class="room-details">
                <div class="room-detail">
                    <span class="detail-label">Location:</span>
                    <span id="roomLocation">3F</span>
                </div>
                <div class="room-detail">
                    <span class="detail-label">Category:</span>
                    <span id="roomCategory" class="category-badge">Computer Laboratory</span>
                </div>
            </div>
            <button class="close-modal" id="closeModal">Close</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="assets/leaflet/leaflet.js"></script>

    <!-- Your Script -->
    <script src="script.js" defer></script>

</body>
</html>
